server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to /cafe/
    location = / {
        return 301 /cafe/;
    }

    # Apple Pay domain verification
    location /.well-known/ {
        add_header Content-Type application/octet-stream;
    }

    # SPA: serve under /cafe, fall back to index.html for client-side routing
    location /cafe {
        try_files $uri $uri/ /cafe/index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively (Vite adds content hashes)
    location ~* /cafe/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for index.html
    location = /cafe/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
